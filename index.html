<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Almarai:wght@300;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-bg"></div>
    <div class="vignette"></div>

    <section id="screen-welcome" class="screen active">
        <div class="glass-hero">
            <h1 class="main-title">Escape Room</h1>
            <div class="luxury-divider"></div>
            <button class="btn-prime" onclick="game.startLobby()">اقتحام النظام</button>
        </div>
    </section>

    <header id="main-nav" class="hidden">
        <div class="nav-content glass-effect">
            <div class="stat-box">
                <span class="label">الرصيد</span>
                <div class="value gold-txt"><span id="coin-val">60</span> 🪙</div>
            </div>
            <div class="stat-box">
                <span class="label">مؤقت البوابة</span>
                <div id="timer-display" class="value timer-txt">00:00</div>
            </div>
            <div class="nav-actions">
                <button class="action-btn" onclick="game.toggleAdmin()">⚙️ الإدارة</button>
                <button class="action-btn market-btn" onclick="game.openMarket()">🛒 السوق</button>
            </div>
        </div>
    </header>

    <section id="screen-lobby" class="screen hidden">
        <div class="lobby-wrapper">
            <div class="grid-30" id="gates-container"></div>
        </div>
    </section>

    <section id="screen-puzzle" class="screen hidden">
        <div class="puzzle-container">
            <div class="puzzle-card glass-effect">
                <h2 id="puzzle-title" class="gold-txt">البوابة #01</h2>
                <div class="puzzle-body">
                    <p id="puzzle-desc"></p>
                    
                    <div id="wire-stage" class="hidden">
                        <div class="wires-container">
                            <div class="wire red" onclick="game.cutWire('red')"></div>
                            <div class="wire blue" onclick="game.cutWire('blue')"></div>
                            <div class="wire yellow" onclick="game.cutWire('yellow')"></div>
                            <div class="wire green" onclick="game.cutWire('green')"></div>
                        </div>
                    </div>

                    <div id="media-stage" class="hidden">
                        <div id="image-container"></div>
                        <div id="audio-container"></div>
                    </div>
                </div>

                <div class="puzzle-controls" id="input-area">
                    <input type="text" id="user-input" placeholder="أدخل الشفرة...">
                    <button class="btn-decode" onclick="game.checkResult()">تفكيك</button>
                </div>
                <button class="btn-cancel" onclick="game.returnToLobby()">تراجع تكتيكي</button>
            </div>
        </div>
    </section>

    <div id="panel-admin" class="modal-overlay hidden">
        <div class="modal-box glass-effect admin-border">
            <h3>لوحة الإدارة</h3>
            <div class="admin-grid">
                <button onclick="game.adminUpdateCoins(10)">+10 عملات</button>
                <button onclick="game.adminUpdateCoins(-10)">-10 عملات</button>
                <button onclick="game.adminUpdateTime(30)">+30 ثانية</button>
                <button onclick="game.adminUpdateTime(-30)">-30 ثانية</button>
            </div>
            <button class="close-btn" onclick="game.toggleAdmin()">إغلاق</button>
        </div>
    </div>

    <div id="panel-market" class="modal-overlay hidden">
        <div class="modal-box glass-effect market-border">
            <h3>سوق المساعدات</h3>
            <div class="market-list">
                <div class="m-item">💡 تلميح (30 كوينز) <button onclick="game.buy('hint')">شراء</button></div>
                <div class="m-item">⏳ وقت (60 كوينز) <button onclick="game.buy('time')">شراء</button></div>
            </div>
            <button class="close-btn" onclick="game.closeMarket()">رجوع</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
