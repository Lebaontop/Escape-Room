<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@300;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-bg"></div>

    <section id="screen-welcome" class="screen active">
        <div class="stream-hero">
            <div class="live-badge">🔴 النظام مفعل - جاهز للاختراق</div>
            <h1 class="main-title">SOLAR GAMES</h1>
            <p class="subtitle">THE ESCAPE ROOM</p>
            <div class="cyber-divider"></div>
            <input type="password" id="entry-code" placeholder="أدخل رمز الدخول..." style="margin-bottom: 20px; padding: 15px; text-align: center; font-size: 1.5rem; border: 2px solid var(--apple); background: #000; color: var(--apple); border-radius: 4px; width: 100%; outline: none; letter-spacing: 5px; font-family: monospace;">
            <br>
            <button type="button" class="btn-prime" onclick="checkEntryCode()">تسجيل الدخول (Login)</button>
        </div>
    </section>

    <header id="main-nav" class="hidden">
        <div class="nav-content">
            <div class="stat-box">
                <span class="label">وقت الغرفة الحالية</span>
                <div class="value timer-txt" id="global-timer-display">15:00</div>
            </div>
            <div class="nav-actions">
                <button type="button" class="action-btn admin-btn" onclick="game.toggleAdminSidebar(true)">⚙️ تحكم السيرفر (الهوست)</button>
            </div>
        </div>
    </header>

    <div id="admin-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>التحكم المركزي 👑</h3>
            <button type="button" class="close-sidebar-btn" onclick="game.toggleAdminSidebar(false)">×</button>
        </div>
        <div class="sidebar-section">
            <h4>وقت الغرفة الحالية</h4>
            <div class="admin-input-group">
                <div class="row">
                    <button type="button" onclick="game.toggleGlobalTimer()">▶️ تشغيل / إيقاف ⏸️</button>
                </div>
                <div class="row" style="margin-top:5px;">
                    <button type="button" onclick="game.modifyGlobalTimer(60)">+ دقيقة</button>
                    <button type="button" onclick="game.modifyGlobalTimer(-60)">- دقيقة</button>
                </div>
            </div>
        </div>
        <div class="sidebar-section">
            <h4>تجاوز النظام</h4>
            <button type="button" class="btn-admin-action btn-prime-style" onclick="game.adminInstantSolveGate()">✅ اختراق إجباري للغرفة</button>
        </div>
    </div>

    <section id="screen-lobby" class="screen hidden">
        <div class="lobby-wrapper">
            <div class="server-header">
                <h2 class="category-title">🔻 CHANNELS (VOICE SECURE)</h2>
            </div>
            <div class="discord-channels-list" id="gates-container"></div>
        </div>
    </section>

    <section id="screen-puzzle" class="screen hidden">
        <div class="puzzle-container">
            <div class="puzzle-card" id="main-puzzle-card">
                <div class="puzzle-header-actions">
                    <h2 id="puzzle-title" class="solar-txt" style="margin: 0; font-family: 'Rajdhani', sans-serif; display:flex; align-items:center; gap:10px;"><span style="color:#aaa;">🔊</span> # ROOM-01</h2>
                    <div id="puzzle-global-timer" class="timer-txt">15:00</div>
                </div>

                <div class="puzzle-body">
                    <div id="interactive-stage-container">
                        <p class="track-title" id="int-desc">يتم تحميل تعليمات المهمة...</p>
                        <div id="interactive-stage"></div>
                    </div>

                    <div id="text-stage" class="hidden bot-message">
                        <div class="bot-header">🤖 HACK-BOT <span class="bot-tag">FIREWALL BYPASSED</span></div>
                        <p id="puzzle-desc">يتم فك التشفير...</p>
                    </div>
                </div>
                
                <div class="puzzle-controls hidden" id="input-area">
                    <input type="text" id="user-input" placeholder="أدخل كلمة المرور النهائية...">
                    <button type="button" class="btn-decode" onclick="game.checkResult()">تأكيد (Execute)</button>
                </div>

                <button type="button" class="btn-cancel mt-10" onclick="game.returnToLobby()">إلغاء الاتصال والعودة (Disconnect)</button>
            </div>
        </div>
    </section>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
