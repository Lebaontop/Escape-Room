<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLAR Escape Room</title>
    <!-- ربط ملف التنسيق -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SOLAR GOLDEN EDITION</h1>
    
    <!-- حاوية الـ 30 باب -->
    <div class="grid-container" id="doorsGrid"></div>

    <!-- نافذة اللغز المستقلة -->
    <div class="modal" id="puzzleModal">
        <div class="modal-content">
            <h2 id="puzzleTitle">الباب</h2>
            
            <div class="puzzle-visual" id="puzzleVisual">
                <!-- يتم حقن الوصف البصري الواقعي هنا برمجياً -->
            </div>
            
            <p id="puzzleDescription" class="puzzle-desc">محتوى اللغز...</p>
            
            <!-- المؤقت اليدوي المنفصل -->
            <div class="timer-container">
                <div class="timer" id="puzzleTimer">05:00</div>
                <div class="controls">
                    <button onclick="startTimer()">بدء الوقت</button>
                    <button onclick="pauseTimer()">إيقاف مؤقت</button>
                    <button onclick="resetTimer()">إعادة ضبط</button>
                </div>
            </div>

            <button class="close-btn" onclick="closeModal()">العودة للأبواب</button>
        </div>
    </div>

    <!-- ربط ملف البرمجة -->
    <script src="script.js"></script>
</body>
</html>
